<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00a884">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>HERE Social</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/themes/dark.css">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/assets/splash/logo.png" as="image">
    <link rel="preload" href="/css/main.css" as="style">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash-screen visible">
        <div class="splash-content">
            <img src="/assets/splash/logo.png" alt="HERE" class="logo bounce">
            <div class="loader"></div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app" class="app hidden">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <h1 class="app-title">HERE</h1>
            </div>
            <div class="top-bar-right">
                <button class="icon-button" id="searchBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                    </svg>
                </button>
                <button class="icon-button" id="notificationsBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor"/>
                    </svg>
                    <span class="badge" id="notificationBadge" style="display: none;">0</span>
                </button>
            </div>
        </header>

        <!-- Main Content Area (Pages render here) -->
        <main id="main-content" class="main-content">
            <!-- Pages will be injected here by router -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5.69l5 4.5V18h-3v-5H10v5H7v-7.81l5-4.5M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z" fill="currentColor"/>
                </svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="friends">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-1 .05 1.16.84 2 1.87 2 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
                </svg>
                <span>Friends</span>
            </button>
            <button class="nav-item" data-page="explore">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z" fill="currentColor"/>
                </svg>
                <span>Explore</span>
            </button>
            <button class="nav-item" data-page="chat">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z" fill="currentColor"/>
                    <circle cx="12" cy="11" r="1.5" fill="currentColor"/>
                    <circle cx="16" cy="11" r="1.5" fill="currentColor"/>
                    <circle cx="8" cy="11" r="1.5" fill="currentColor"/>
                </svg>
                <span>Chat</span>
                <span class="badge" id="chatBadge" style="display: none;">0</span>
            </button>
            <button class="nav-item" data-page="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
                </svg>
                <span>Profile</span>
            </button>
        </nav>

        <!-- Floating AI Assistant Button -->
        <div id="hereAIButton" class="here-ai-button" draggable="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <!-- All JavaScript files go here, just before closing body -->
    <!-- Utils -->
    <script src="/js/utils/constants.js"></script>
    <script src="/js/utils/helpers.js"></script>
    <script src="/js/utils/animations.js"></script>

    <!-- Database Layer -->
    <script src="/js/db/schemas.js"></script>
    <script src="/js/db/index.js"></script>
    <script src="/js/db/migrations.js"></script>

    <!-- State Management -->
    <script src="/js/store/index.js"></script>
    <script src="/js/store/auth.store.js"></script>
    <script src="/js/store/feed.store.js"></script>
    <script src="/js/store/chat.store.js"></script>
    <script src="/js/store/sync.store.js"></script>

    <!-- Services -->
    <script src="/js/services/api.js"></script>
    <script src="/js/services/websocket.js"></script>
    <script src="/js/services/sync.js"></script>
    <script src="/js/services/push.js"></script>
    <script src="/js/services/media.js"></script>

    <!-- Components -->
    <script src="/js/components/BottomNav.js"></script>
    <script src="/js/components/PostCard.js"></script>
    <script src="/js/components/ChatBubble.js"></script>
    <script src="/js/components/FriendItem.js"></script>
    <script src="/js/components/AIAssistant.js"></script>

    <!-- Pages - Core -->
    <script src="/js/pages/Auth.js"></script>
    <script src="/js/pages/Home.js"></script>
    <script src="/js/pages/Chat.js"></script>
    <script src="/js/pages/ChatDetail.js"></script>
    <script src="/js/pages/Friends.js"></script>
    <script src="/js/pages/Profile.js"></script>
    <!-- Add after other pages -->
<script src="/js/pages/CreatePost.js"></script>
<script src="/js/pages/PostDetail.js"></script>
<script src="/js/pages/ProfileEdit.js"></script>
<script src="/js/pages/GroupChat.js"></script>
    
    <!-- Pages - Discovery -->
    <script src="/js/pages/Explore.js"></script>
    <script src="/js/pages/Search.js"></script>
    
    <!-- Pages - System -->
    <script src="/js/pages/Notifications.js"></script>
    <script src="/js/pages/Settings.js"></script>
    
    
    <!-- Router & App Init -->
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }

        // Log app version
        console.log('HERE Social v1.0.0 - Offline First PWA');
    </script>
</body>
</html>
